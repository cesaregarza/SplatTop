map $http_x_forwarded_proto $splat_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_user_agent $competition_preview_bot {
    default 0;
    "~*(discordbot|slackbot-linkexpanding|twitterbot|facebookexternalhit|linkedinbot|whatsapp|telegrambot|skypeuripreview|googlebot|bingbot|embedly|quora link preview|pinterest|vkshare|bot|crawler|spider)" 1;
}

server {
    listen 80;

    error_page 418 = @competition_player_preview;

    location ~ ^/u/[^/]+/?$ {
        if ($competition_preview_bot) {
            return 418;
        }

        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location @competition_player_preview {
        proxy_pass http://fast-api-app-service:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $splat_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://fast-api-app-service:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $splat_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    location /ws/ {
        proxy_pass http://fast-api-app-service:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /share/ {
        proxy_pass http://fast-api-app-service:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $splat_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }
}
