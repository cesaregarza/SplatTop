name: Update Assets

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: update-assets
  cancel-in-progress: false

jobs:
  update-assets:
    runs-on: ubuntu-latest
    environment: SplatTop
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install script dependencies
        run: uv sync --frozen --no-default-groups --group scripts --no-install-project

      - name: Fetch Spaces credentials
        id: broker
        uses: cesaregarza/.github/actions/fetch-broker-credentials@main
        with:
          broker-url: https://credentials.garz.ai
          audience: https://credentials.garz.ai/v1
          bundle: digitalocean-spaces-write

      - name: Run update_assets.py
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          DO_SPACES_KEY: ${{ fromJson(steps.broker.outputs.secrets-json).DIGITALOCEAN_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ fromJson(steps.broker.outputs.secrets-json).DIGITALOCEAN_SPACES_SECRET }}
          DO_SPACES_REGION: ${{ vars.DO_SPACES_REGION }}
          DO_SPACES_ENDPOINT: ${{ vars.DO_SPACES_ENDPOINT }}
        run: uv run --frozen --no-default-groups --group scripts python scripts/update_assets.py
