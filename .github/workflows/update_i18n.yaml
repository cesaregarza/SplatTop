name: Build and Update i18n

on:
  push:
    branches:
      - main
    paths:
      - "i18n/**"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  i18n:
    runs-on: ubuntu-latest
    environment: SplatTop
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Check if push is from GitHub Actions
        id: check_ci_step
        run: |
          LAST_COMMITTER=$(git log -1 --pretty=format:'%an')
          if [ "$LAST_COMMITTER" = "GitHub Actions" ]; then
            exit 0
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo 'export PATH="$HOME/.poetry/bin:$PATH"' >> $GITHUB_ENV

      - name: Install script dependencies
        run: |
          poetry install --with scripts --no-root

      - name: Set script permissions
        run: |
          chmod +x scripts/i18n.py

      - name: List scripts directory contents
        run: ls -R scripts

      - name: Fetch Spaces credentials
        id: broker
        uses: cesaregarza/.github/actions/fetch-broker-credentials@main
        with:
          broker-url: https://credentials.garz.ai
          audience: https://credentials.garz.ai/v1
          bundle: digitalocean-spaces-write

      - name: Run i18n script
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          DO_SPACES_KEY: ${{ fromJson(steps.broker.outputs.secrets-json).DIGITALOCEAN_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ fromJson(steps.broker.outputs.secrets-json).DIGITALOCEAN_SPACES_SECRET }}
          DO_SPACES_REGION: ${{ vars.DO_SPACES_REGION }}
          DO_SPACES_ENDPOINT: ${{ vars.DO_SPACES_ENDPOINT }}
        run: poetry run python scripts/i18n.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          add-paths: |
            i18n
            src/react_app/public/locales
            src/react_app/src/components/supported_languages.js
            src/react_app/src/i18n.js
          commit-message: "AUTO-I18N: Update i18n files"
          branch: automation/update-i18n
          delete-branch: true
          title: "AUTO-I18N: Update i18n files"
          body: |
            Automated locale refresh generated by `scripts/i18n.py`.
